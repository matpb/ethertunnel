[workspace]
members = ["cargo:."]

# cargo-dist configuration: builds release artifacts + one-line installers.
# Regenerate the CI workflow with `dist init` / `dist generate` after edits.
[dist]
cargo-dist-version = "0.32.0"
ci = "github"
installers = ["shell", "powershell"]
targets = [
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
# Static musl needs the musl toolchain on the Linux runners.
[dist.dependencies.apt]
musl-tools = "*"
